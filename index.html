<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Market Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="title-section">
                <h1>Market Dashboard <span style="font-size: 14px; color: var(--accent-color);">v18</span></h1>
                <div class="status-indicator">
                    <span id="connection-dot" class="dot green"></span>
                    <span id="market-status">Checking connection...</span>
                </div>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <input type="text" id="symbol-input" placeholder="e.g. NVDA,AMD,BTC" autocomplete="off" title="Type single or comma-separated symbols."/>
                    <button id="add-btn" class="btn primary">Add</button>
                </div>
                
                <div class="control-group">
                    <label for="refresh-select">Auto-refresh:</label>
                    <select id="refresh-select">
                        <option value="0">Off</option>
                        <option value="5">5s</option>
                        <option value="30">30s</option>
                        <option value="60">1m</option>
                        <option value="300">5m</option>
                    </select>
                </div>
                
                <button id="refresh-btn" class="btn secondary">Refresh Now</button>
            </div>
        </header>

        <div id="alerts" class="alerts"></div>

        <div class="tabs-wrapper">
            <div id="tabs-list" class="tabs"></div>
            <button id="add-tab-btn" class="btn secondary btn-small" title="Add new watchlist tab">+ New Tab</button>
        </div>

        <div class="table-container">
            <table id="dashboard-table">
                <thead>
                    <tr>
                        <th style="width: 40px;" class="text-center">
                            <input type="checkbox" id="orig-order-cb" checked title="Check to keep original add/drag order">
                        </th>
                        <th style="width: 50px;" class="text-center">Logo</th>
                        <th class="sortable" data-sort="symbol">Ticker <span class="sort-icon"></span></th>
                        <th class="sortable text-right" data-sort="price">Price <span class="sort-icon"></span></th>
                        <th class="sortable text-right" data-sort="changeDay">Change <span class="sort-icon"></span></th>
                        <th class="sortable text-right" data-sort="changePct">Change % <span class="sort-icon"></span></th>
                        <th class="sortable text-right" data-sort="change365">365D Change <span class="sort-icon"></span></th>
                        <th class="sortable text-right" data-sort="return1Y">1Y Return <span class="sort-icon"></span></th>
                        <th class="sortable text-right" data-sort="high52">52W High <span class="sort-icon"></span></th>
                        <th class="sortable text-right" data-sort="low52">52W Low <span class="sort-icon"></span></th>
                        <th class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Rows rendered via JS -->
                </tbody>
            </table>
        </div>
        
        <footer>
            <div class="footer-info">
                <span>Data Mode: Finnhub + Yahoo Finance (Hybrid) | Binance + CoinGecko (Crypto)</span>
                <span>Last Updated: <span id="last-updated-time">—</span></span>
            </div>
            <div class="sync-controls">
                <button id="export-btn" class="btn secondary btn-small">Export Sync Code</button>
                <button id="import-btn" class="btn secondary btn-small">Import Sync Code</button>
            </div>
        </footer>
    </div>

    <script src="local-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
