<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Market Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="title-section">
                <h1>Market Dashboard</h1>
                <div class="status-indicator">
                    <span id="connection-dot" class="dot green"></span>
                    <span id="market-status">Checking connection...</span>
                </div>
            </div>
            <div class="controls">
                <div class="control-group">
                    <select id="source-select">
                        <option value="twelvedata">Twelve Data</option>
                        <option value="finnhub">Finnhub</option>
                    </select>
                </div>
                <div class="control-group">
                    <input type="text" id="symbol-input" placeholder="e.g. NVDA,BTC" autocomplete="off"/>
                    <button id="add-btn" class="btn primary">Add</button>
                </div>
                <button id="refresh-btn" class="btn secondary">Refresh</button>
            </div>
        </header>

        <div id="alerts" class="alerts"></div>
        <div class="tabs-wrapper">
            <div id="tabs-list" class="tabs"></div>
            <button id="add-tab-btn" class="btn secondary btn-small">+ New Tab</button>
        </div>

        <div class="table-container">
            <table id="dashboard-table">
                <thead>
                    <tr>
                        <th style="width: 40px;"></th>
                        <th style="width: 50px;" class="text-center">Logo</th>
                        <th class="sortable" data-sort="symbol">Ticker <span class="sort-icon"></span></th>
                        <th class="sortable text-right" data-sort="price">Price <span class="sort-icon"></span></th>
                        <th class="sortable text-right" data-sort="changeDay">Change <span class="sort-icon"></span></th>
                        <th class="sortable text-right" data-sort="changePct">Change % <span class="sort-icon"></span></th>
                        <th class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
    <script src="local-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
